<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <style>
    .room { fill: #f5e6c8; stroke: #333; stroke-width: 2; }
    .wall { fill: none; stroke: #333; stroke-width: 3; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #222; text-anchor: middle; }
    .label-sm { font-family: Arial, sans-serif; font-size: 10px; fill: #222; text-anchor: middle; }
    .icon { fill: #222; }
    .stair { fill: none; stroke: #333; stroke-width: 1.5; }
    .elev { fill: none; stroke: #333; stroke-width: 1.5; }
    .door-arc { fill: none; stroke: #333; stroke-width: 1.5; }
  </style>

  <!-- Background -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- ===== ROOM 1.294 (top center-left) ===== -->
  <rect x="490" y="88" width="88" height="80" class="room"/>
  <text x="534" y="133" class="label">1.294</text>

  <!-- ===== ROOM 1.347 (top right) ===== -->
  <rect x="680" y="88" width="170" height="48" class="room"/>
  <text x="765" y="118" class="label">1.347</text>

  <!-- ===== ROOM 1.345 (right of 1.294 area) ===== -->
  <rect x="720" y="136" width="130" height="68" class="room"/>
  <text x="785" y="175" class="label">1.345</text>

  <!-- Door arc at top area -->
  <path d="M 578 88 A 30 30 0 0 1 608 118" class="door-arc"/>
  <line x1="578" y1="88" x2="578" y2="118" stroke="#333" stroke-width="1.5"/>

  <!-- ===== MAIN HALL / CORRIDOR (diagonal left side) ===== -->
  <!-- Angled corridor wall left -->
  <polygon points="360,200 430,200 460,980 390,980" fill="white" stroke="#333" stroke-width="3"/>

  <!-- ===== ROOM 1.210 (large central auditorium) ===== -->
  <polygon points="490,210 850,210 870,490 610,530 490,490" class="room"/>
  <text x="670" y="380" class="label" style="font-size:16px;">1.210</text>

  <!-- ===== ROOM 1.338 (below 1.210 right) ===== -->
  <rect x="730" y="490" width="120" height="50" class="room"/>
  <text x="790" y="520" class="label">1.338</text>

  <!-- ===== ELEVATOR BANK 1.310 ===== -->
  <rect x="490" y="540" width="200" height="50" class="room"/>
  <!-- Elevator symbols -->
  <rect x="500" y="548" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="518" y="571" class="label-sm">⊙</text>
  <rect x="544" y="548" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="562" y="571" class="label-sm">⊙</text>
  <rect x="588" y="548" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="606" y="571" class="label-sm">⊙</text>
  <text x="545" y="538" class="label-sm">1.310</text>

  <!-- ===== ROOM 1.315 ===== -->
  <rect x="700" y="540" width="60" height="30" class="room"/>
  <text x="730" y="560" class="label-sm">1.315</text>

  <!-- ===== ROOM 1.335 ===== -->
  <rect x="760" y="540" width="90" height="48" class="room"/>
  <text x="805" y="570" class="label-sm">1.335</text>

  <!-- ===== ROOM 1.309 ===== -->
  <rect x="700" y="570" width="60" height="28" class="room"/>
  <text x="730" y="589" class="label-sm">1.309</text>

  <!-- ===== SECOND ELEVATOR BANK ===== -->
  <rect x="490" y="600" width="200" height="50" class="room"/>
  <rect x="500" y="608" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="518" y="631" class="label-sm">⊙</text>
  <rect x="544" y="608" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="562" y="631" class="label-sm">⊙</text>
  <rect x="588" y="608" width="36" height="36" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="606" y="631" class="label-sm">⊙</text>

  <!-- Stair icon left mid -->
  <rect x="760" y="600" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="780" y="625" class="label-sm">🚶</text>

  <!-- ===== ROOM 1.424 ===== -->
  <rect x="490" y="660" width="200" height="60" class="room"/>
  <text x="590" y="695" class="label">1.424</text>

  <!-- ===== ROOM 1.301 ===== -->
  <rect x="700" y="620" width="150" height="120" class="room"/>
  <text x="775" y="685" class="label">1.301</text>

  <!-- ===== ROOM 1.437 (large right) ===== -->
  <rect x="860" y="620" width="110" height="180" class="room"/>
  <text x="915" y="715" class="label">1.437</text>

  <!-- ===== ROOM 1.134 ===== -->
  <rect x="490" y="720" width="60" height="50" class="room"/>
  <text x="520" y="750" class="label-sm">1.134</text>

  <!-- ===== ROOM 1.410 (WC women) ===== -->
  <rect x="570" y="730" width="60" height="60" class="room"/>
  <text x="600" y="756" class="label-sm">1.410</text>
  <!-- Female icon -->
  <text x="600" y="780" class="label" style="font-size:18px;">♀</text>

  <!-- ===== ROOM 1.130 ===== -->
  <rect x="430" y="750" width="60" height="60" class="room"/>
  <text x="460" y="785" class="label-sm">1.130</text>

  <!-- ===== ROOM 1.132 ===== -->
  <rect x="490" y="775" width="80" height="40" class="room"/>
  <text x="530" y="800" class="label-sm">1.132</text>

  <!-- ===== ROOM 1.432 ===== -->
  <rect x="700" y="730" width="50" height="30" class="room"/>
  <text x="725" y="750" class="label-sm">1.432</text>

  <!-- ===== ROOM 1.430 ===== -->
  <rect x="700" y="760" width="50" height="30" class="room"/>
  <!-- Male icon -->
  <text x="715" y="772" class="label" style="font-size:14px;">♂</text>
  <text x="725" y="782" class="label-sm">1.430</text>

  <!-- ===== ROOM 1.494 (bottom right) ===== -->
  <rect x="760" y="850" width="100" height="60" class="room"/>
  <text x="810" y="885" class="label-sm">1.494</text>

  <!-- ===== ROOM 1.115 (bottom) ===== -->
  <rect x="700" y="910" width="200" height="70" class="room"/>
  <text x="800" y="950" class="label">1.115</text>

  <!-- ===== ROOM 1.494 stair box ===== -->
  <rect x="660" y="850" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="680" y="870" class="label-sm" style="font-size:8px;">STAIR</text>

  <!-- ===== ROOM 1.494 label ===== -->
  <rect x="640" y="848" width="20" height="60" class="room"/>
  <text x="650" y="885" class="label-sm" style="font-size:9px; writing-mode:tb;">1.494</text>

  <!-- Stair icons on left side corridor -->
  <!-- Upper stair -->
  <rect x="370" y="255" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="265" x2="410" y2="265" stroke="#333" stroke-width="1"/>
  <line x1="370" y1="275" x2="410" y2="275" stroke="#333" stroke-width="1"/>
  <line x1="370" y1="285" x2="410" y2="285" stroke="#333" stroke-width="1"/>

  <!-- Mid stair -->
  <rect x="380" y="450" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="380" y1="460" x2="420" y2="460" stroke="#333" stroke-width="1"/>
  <line x1="380" y1="470" x2="420" y2="470" stroke="#333" stroke-width="1"/>
  <line x1="380" y1="480" x2="420" y2="480" stroke="#333" stroke-width="1"/>

  <!-- Lower stair -->
  <rect x="400" y="640" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="400" y1="650" x2="440" y2="650" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="660" x2="440" y2="660" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="670" x2="440" y2="670" stroke="#333" stroke-width="1"/>

  <!-- Outline border of the whole floor -->
  <polygon points="430,88 850,88 850,200 970,200 970,820 850,820 850,980 640,980 640,840 460,840 460,980 390,980 390,840 360,840 360,200 430,200"
    fill="none" stroke="#333" stroke-width="3"/>
</svg>
