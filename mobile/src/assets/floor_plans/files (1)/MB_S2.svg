<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <style>
    .room { fill: #f5e6c8; stroke: #333; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #222; text-anchor: middle; }
    .label-sm { font-family: Arial, sans-serif; font-size: 10px; fill: #222; text-anchor: middle; }
    .stair-lines { fill: none; stroke: #333; stroke-width: 1; }
  </style>

  <rect width="1024" height="1024" fill="white"/>

  <!-- ===== TOP SECTION ===== -->

  <!-- S2.245 (top-left large) -->
  <rect x="350" y="95" width="160" height="110" class="room"/>
  <text x="430" y="155" class="label">S2.245</text>

  <!-- S2.255 -->
  <rect x="515" y="95" width="90" height="110" class="room"/>
  <text x="560" y="145" class="label">S2.255</text>
  <!-- Stair icon in S2.255 -->
  <rect x="530" y="160" width="30" height="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="530" y1="168" x2="560" y2="168" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="176" x2="560" y2="176" stroke="#333" stroke-width="1"/>
  <line x1="530" y1="184" x2="560" y2="184" stroke="#333" stroke-width="1"/>

  <!-- S2.273 -->
  <rect x="610" y="95" width="38" height="110" class="room"/>
  <text x="629" y="155" class="label-sm">S2.273</text>

  <!-- S2.275 -->
  <rect x="648" y="95" width="38" height="110" class="room"/>
  <text x="667" y="155" class="label-sm">S2.275</text>

  <!-- S2.279 -->
  <rect x="686" y="95" width="38" height="110" class="room"/>
  <text x="705" y="155" class="label-sm">S2.279</text>

  <!-- S2.285 (top-right large) -->
  <rect x="730" y="95" width="210" height="110" class="room"/>
  <text x="835" y="155" class="label">S2.285</text>

  <!-- ===== MID SECTION ===== -->

  <!-- Left diagonal corridor -->
  <polygon points="290,230 380,230 430,860 340,860" fill="white" stroke="#333" stroke-width="3"/>

  <!-- Stair icon left side upper -->
  <rect x="300" y="330" width="40" height="40" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="300" y1="340" x2="340" y2="340" class="stair-lines"/>
  <line x1="300" y1="350" x2="340" y2="350" class="stair-lines"/>
  <line x1="300" y1="360" x2="340" y2="360" class="stair-lines"/>

  <!-- Stair icons left mid -->
  <rect x="325" y="550" width="35" height="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="325" y1="558" x2="360" y2="558" class="stair-lines"/>
  <line x1="325" y1="566" x2="360" y2="566" class="stair-lines"/>
  <line x1="325" y1="574" x2="360" y2="574" class="stair-lines"/>

  <rect x="365" y="550" width="35" height="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="365" y1="558" x2="400" y2="558" class="stair-lines"/>
  <line x1="365" y1="566" x2="400" y2="566" class="stair-lines"/>
  <line x1="365" y1="574" x2="400" y2="574" class="stair-lines"/>

  <!-- S2.210 (large lecture room) -->
  <rect x="430" y="210" width="230" height="310" class="room"/>
  <text x="545" y="370" class="label" style="font-size:15px;">S2.210</text>

  <!-- S2.330 (right of S2.210) -->
  <rect x="665" y="210" width="275" height="310" class="room"/>
  <text x="802" y="370" class="label" style="font-size:15px;">S2.330</text>

  <!-- S2.230 -->
  <rect x="780" y="530" width="80" height="50" class="room"/>
  <text x="820" y="560" class="label-sm">S2.230</text>

  <!-- S2.345 (elevator label) -->
  <rect x="430" y="530" width="200" height="50" class="room"/>
  <text x="490" y="548" class="label-sm">S2.345</text>
  <!-- Elevator symbols -->
  <rect x="440" y="536" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="457" y="558" class="label-sm">⊙</text>
  <rect x="480" y="536" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="497" y="558" class="label-sm">⊙</text>
  <rect x="520" y="536" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="537" y="558" class="label-sm">⊙</text>

  <!-- ===== LOWER SECTION ===== -->

  <!-- Second elevator bank -->
  <rect x="430" y="595" width="200" height="50" class="room"/>
  <rect x="440" y="601" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="457" y="623" class="label-sm">⊙</text>
  <rect x="480" y="601" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="497" y="623" class="label-sm">⊙</text>
  <rect x="520" y="601" width="34" height="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="537" y="623" class="label-sm">⊙</text>

  <!-- S2.394 stair box right -->
  <rect x="780" y="593" width="60" height="50" class="room"/>
  <text x="810" y="620" class="label-sm">S2.394</text>
  <!-- Stair icon -->
  <line x1="785" y1="605" x2="835" y2="605" class="stair-lines"/>
  <line x1="785" y1="615" x2="835" y2="615" stroke="#333" stroke-width="1"/>
  <line x1="785" y1="625" x2="835" y2="625" stroke="#333" stroke-width="1"/>

  <!-- S2.146 -->
  <rect x="360" y="640" width="120" height="50" class="room"/>
  <text x="420" y="670" class="label-sm">S2.146</text>

  <!-- S2.145, S2.149, S2.135 -->
  <rect x="360" y="690" width="120" height="80" class="room"/>
  <text x="420" y="710" class="label-sm">S2.145</text>
  <text x="420" y="725" class="label-sm">S2.149</text>
  <text x="420" y="740" class="label-sm">S2.135</text>

  <!-- S2.440 (corridor) -->
  <rect x="490" y="645" width="130" height="100" class="room"/>
  <text x="555" y="700" class="label">S2.440</text>

  <!-- S2.438 -->
  <rect x="626" y="645" width="70" height="50" class="room"/>
  <text x="661" y="675" class="label-sm">S2.438</text>

  <!-- S2.437 -->
  <rect x="626" y="695" width="70" height="55" class="room"/>
  <text x="661" y="727" class="label-sm">S2.437</text>

  <!-- S2.435 (large right) -->
  <rect x="700" y="645" width="240" height="160" class="room"/>
  <text x="820" y="730" class="label">S2.435</text>

  <!-- S2.410 (WC women) -->
  <rect x="490" y="748" width="70" height="70" class="room"/>
  <text x="525" y="770" class="label-sm">S2.410</text>
  <text x="525" y="795" class="label" style="font-size:18px;">♀</text>

  <!-- S2.420 (WC men) -->
  <rect x="565" y="748" width="70" height="70" class="room"/>
  <text x="600" y="770" class="label-sm">S2.420</text>
  <text x="600" y="795" class="label" style="font-size:18px;">♂</text>

  <!-- S2.428 -->
  <rect x="626" y="750" width="120" height="50" class="room"/>
  <text x="686" y="780" class="label-sm">S2.428</text>

  <!-- S2.445 -->
  <rect x="840" y="810" width="100" height="60" class="room"/>
  <text x="890" y="845" class="label-sm">S2.445</text>

  <!-- S2.115 -->
  <rect x="360" y="775" width="130" height="100" class="room"/>
  <text x="425" y="830" class="label">S2.115</text>

  <!-- S2.401 -->
  <rect x="490" y="840" width="210" height="100" class="room"/>
  <text x="595" y="895" class="label">S2.401</text>

  <!-- S2.494 + stair -->
  <rect x="705" y="840" width="130" height="60" class="room"/>
  <text x="770" y="875" class="label-sm">S2.494</text>
  <!-- Stair -->
  <rect x="710" y="845" width="30" height="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="710" y1="853" x2="740" y2="853" class="stair-lines"/>
  <line x1="710" y1="861" x2="740" y2="861" class="stair-lines"/>
  <line x1="710" y1="869" x2="740" y2="869" class="stair-lines"/>

  <!-- S2.465 -->
  <rect x="705" y="903" width="130" height="60" class="room"/>
  <text x="770" y="937" class="label-sm">S2.465</text>

  <!-- S2.455 -->
  <rect x="840" y="870" width="100" height="93" class="room"/>
  <text x="890" y="920" class="label-sm">S2.455</text>

  <!-- S2.105 bottom -->
  <rect x="360" y="878" width="130" height="60" class="room"/>
  <text x="425" y="912" class="label">S2.105</text>

  <!-- Outer boundary -->
  <polygon points="290,95 940,95 940,205 970,205 970,870 840,870 840,800 700,800 700,965 490,965 490,815 360,815 360,940 290,940"
    fill="none" stroke="#333" stroke-width="3"/>
</svg>
