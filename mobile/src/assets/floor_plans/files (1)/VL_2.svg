<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <style>
    .room { fill: #f5e6c8; stroke: #333; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #222; text-anchor: middle; }
    .label-sm { font-family: Arial, sans-serif; font-size: 10px; fill: #222; text-anchor: middle; }
    .icon { fill: #222; font-size: 16px; text-anchor: middle; }
    .stair-box { fill: none; stroke: #333; stroke-width: 1.5; }
  </style>

  <rect width="1024" height="1024" fill="white"/>

  <!-- ===== TOP AREA (mostly open/white space) ===== -->

  <!-- Stair block top center -->
  <rect x="460" y="155" width="60" height="70" class="room"/>
  <rect x="463" y="158" width="30" height="30" class="stair-box"/>
  <line x1="463" y1="166" x2="493" y2="166" stroke="#333" stroke-width="1"/>
  <line x1="463" y1="174" x2="493" y2="174" stroke="#333" stroke-width="1"/>
  <line x1="463" y1="182" x2="493" y2="182" stroke="#333" stroke-width="1"/>

  <!-- VL-212 (WC men) -->
  <rect x="575" y="155" width="90" height="90" class="room"/>
  <text x="620" y="193" class="label">VL-212</text>
  <text x="620" y="218" class="icon">♂</text>

  <!-- VL-205 (large top-right) -->
  <rect x="680" y="120" width="200" height="150" class="room"/>
  <text x="780" y="200" class="label">VL-205</text>

  <!-- VL-210 (WC women) -->
  <rect x="575" y="248" width="90" height="80" class="room"/>
  <text x="620" y="285" class="label">VL-210</text>
  <text x="620" y="308" class="icon">♀</text>

  <!-- ===== LEFT SIDE ===== -->

  <!-- Stair block left side -->
  <rect x="155" y="390" width="50" height="50" class="room"/>
  <rect x="158" y="393" width="28" height="28" class="stair-box"/>
  <line x1="158" y1="401" x2="186" y2="401" stroke="#333" stroke-width="1"/>
  <line x1="158" y1="409" x2="186" y2="409" stroke="#333" stroke-width="1"/>
  <line x1="158" y1="417" x2="186" y2="417" stroke="#333" stroke-width="1"/>

  <!-- VL-202-30 -->
  <rect x="155" y="395" width="120" height="90" class="room"/>
  <text x="215" y="445" class="label">VL-202-30</text>

  <!-- Crosshair/special icon -->
  <circle cx="215" cy="500" r="18" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="215" y1="482" x2="215" y2="518" stroke="#333" stroke-width="1"/>
  <line x1="197" y1="500" x2="233" y2="500" stroke="#333" stroke-width="1"/>

  <!-- ===== CENTER AREA - mostly open floor ===== -->
  <!-- Large open area -->
  <rect x="155" y="130" width="305" height="260" fill="white" stroke="#333" stroke-width="2"/>

  <!-- ===== RIGHT-CENTER cluster ===== -->

  <!-- VL-203-2 -->
  <rect x="575" y="340" width="80" height="55" class="room"/>
  <text x="615" y="372" class="label-sm">VL-203-2</text>

  <!-- VL-203-3 -->
  <rect x="660" y="340" width="80" height="55" class="room"/>
  <text x="700" y="372" class="label-sm">VL-203-3</text>

  <!-- VL-204 (large) -->
  <rect x="745" y="280" width="175" height="230" class="room"/>
  <text x="832" y="400" class="label">VL-204</text>

  <!-- VL-203-1 -->
  <rect x="575" y="398" width="80" height="55" class="room"/>
  <text x="615" y="430" class="label-sm">VL-203-1</text>

  <!-- VL-201-1 -->
  <rect x="575" y="456" width="80" height="55" class="room"/>
  <text x="615" y="488" class="label-sm">VL-201-1</text>

  <!-- VL-201 (large) -->
  <rect x="575" y="514" width="345" height="200" class="room"/>
  <text x="747" y="618" class="label" style="font-size:15px;">VL-201</text>
  <!-- Rounded corner indicator -->
  <path d="M 575 700 Q 575 714 589 714" fill="none" stroke="#333" stroke-width="2"/>

  <!-- VL-297-1 -->
  <rect x="925" y="514" width="65" height="80" class="room"/>
  <text x="957" y="558" class="label-sm">VL-297-1</text>

  <!-- ===== BOTTOM RIGHT ===== -->

  <!-- Stair bottom right -->
  <rect x="745" y="730" width="60" height="55" class="room"/>
  <rect x="748" y="733" width="28" height="28" class="stair-box"/>
  <line x1="748" y1="741" x2="776" y2="741" stroke="#333" stroke-width="1"/>
  <line x1="748" y1="749" x2="776" y2="749" stroke="#333" stroke-width="1"/>
  <line x1="748" y1="757" x2="776" y2="757" stroke="#333" stroke-width="1"/>

  <!-- VL-240 -->
  <rect x="810" y="730" width="120" height="100" class="room"/>
  <text x="870" y="785" class="label">VL-240</text>

  <!-- ===== BOTTOM LEFT ===== -->

  <!-- VL-202-1 -->
  <rect x="30" y="855" width="100" height="55" class="room"/>
  <text x="40" y="873" class="label-sm">🧳</text>
  <text x="80" y="893" class="label-sm">VL-202-1</text>

  <!-- Stair bottom left -->
  <rect x="30" y="920" width="55" height="55" class="room"/>
  <rect x="33" y="923" width="28" height="28" class="stair-box"/>
  <line x1="33" y1="931" x2="61" y2="931" stroke="#333" stroke-width="1"/>
  <line x1="33" y1="939" x2="61" y2="939" stroke="#333" stroke-width="1"/>
  <line x1="33" y1="947" x2="61" y2="947" stroke="#333" stroke-width="1"/>

  <!-- Outer building boundary (approximate from image) -->
  <!-- Top part -->
  <polyline points="155,50 950,50 950,280 920,280 920,130 680,130 680,50" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Right side -->
  <polyline points="950,280 995,280 995,840 920,840 920,730 745,730" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Bottom right -->
  <polyline points="745,730 745,970 575,970 575,714 460,714" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Bottom left -->
  <polyline points="460,714 460,970 30,970 30,855" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Left side -->
  <polyline points="30,855 155,855 155,130 460,130 460,50" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Left re-entrant -->
  <polyline points="30,855 30,50" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
